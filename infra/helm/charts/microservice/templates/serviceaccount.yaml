{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "microservice.serviceAccountName" . }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.serviceAccount.workloadIdentity.enabled }}
    azure.workload.identity/client-id: {{ required "serviceAccount.workloadIdentity.clientId is required" .Values.serviceAccount.workloadIdentity.clientId | quote }}
    {{- end }}
{{- end }}
