# loadgen — Locust web UI. Run on demand, not scaled.
nameOverride: loadgen
image: { repository: "PLACEHOLDER", tag: latest }
replicaCount: 1
port: 8089
env:
  TARGET_HOST: "http://api-gateway:8080"
args:
  - "--host=$(TARGET_HOST)"
  - "--web-host=0.0.0.0"
  - "--web-port=8089"
# Locust serves UI at /; no /healthz endpoint.
probes:
  enabled: true
  readiness:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 30
    periodSeconds: 20
resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 1,    memory: 1Gi }
